<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Touchdown Timer</title>
<!-- ホーム画面に追加でアプリ風に起動 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TD Timer">
<meta name="theme-color" content="#0A0D12">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230A0D12'/><text y='68' x='50' text-anchor='middle' font-size='52'>⏱</text></svg>">
<style>
  :root {
    --bg:#0A0D12; --panel:#131820; --panel2:#1A212C; --line:#2A3442;
    --text:#E8EEF5; --dim:#8B99AB; --accent:#FFD34D; --mark:#FF5A3C; --ok:#4ADE80;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Hiragino Sans','Noto Sans JP',sans-serif;
    padding:calc(env(safe-area-inset-top) + 14px) 12px calc(env(safe-area-inset-bottom) + 30px);
    max-width:560px; margin:0 auto;
    -webkit-user-select:none; user-select:none;
  }
  .head { display:flex; align-items:baseline; gap:10px; margin-bottom:12px; }
  .logo { font-size:21px; font-weight:800; letter-spacing:.02em; }
  .logo span { color:var(--accent); }
  .sub { font-size:11px; color:var(--dim); }

  .videoBox { background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden; transition:border-color .15s; }
  .videoBox.flash { border-color:var(--accent); }
  video { width:100%; display:block; background:#000; max-height:44vh; }
  .drop { padding:52px 20px; text-align:center; color:var(--dim); cursor:pointer; }
  .drop .icon { font-size:40px; margin-bottom:8px; }
  .err { padding:10px 14px; font-size:12px; color:var(--mark); display:none; }

  .timeline { position:relative; height:38px; background:var(--panel2); touch-action:none; }
  .tl-progress { position:absolute; left:0; top:0; bottom:0; background:rgba(255,211,77,.14); }
  .tl-mark { position:absolute; top:0; bottom:0; width:2px; background:var(--mark); }
  .tl-mark.start { background:var(--ok); }
  .tl-cursor { position:absolute; top:0; bottom:0; width:2px; background:var(--accent); }

  .clockRow { display:flex; justify-content:space-between; align-items:center; margin:12px 2px 10px; }
  .clock { font-family:ui-monospace,'SF Mono',Menlo,monospace; font-size:32px; font-weight:700; color:var(--accent); }
  .meta { font-size:11px; color:var(--dim); text-align:right; }
  .meta b { color:var(--text); }

  .grid5 { display:grid; grid-template-columns:1fr 1fr 1.25fr 1fr 1fr; gap:8px; }
  button, select {
    background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:10px; padding:12px 8px; font-size:15px; font-family:inherit; cursor:pointer;
  }
  button:active { background:#232d3b; }
  .play { font-weight:700; }

  .settings { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; align-items:center; font-size:12px; color:var(--dim); }
  .settings select { padding:7px 8px; font-size:13px; }

  #markBtn {
    width:100%; margin-top:14px; padding:22px 0; border:none; border-radius:14px;
    background:var(--accent); color:#141200; font-size:20px; font-weight:800; letter-spacing:.03em;
  }
  #markBtn:disabled { background:var(--panel2); color:var(--dim); }
  #markBtn:active:not(:disabled) { transform:scale(.985); }

  .table { margin-top:16px; background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden; }
  .row { display:grid; grid-template-columns:74px 1fr 1fr 96px; padding:10px 12px; align-items:center; border-bottom:1px solid var(--line); font-size:14px; }
  .row.hdr { font-size:11px; color:var(--dim); letter-spacing:.05em; }
  .lbl { font-weight:700; cursor:pointer; }
  .lbl.start { color:var(--ok); }
  .mono { font-family:ui-monospace,Menlo,monospace; }
  .split { color:var(--accent); font-weight:600; }
  .ops { display:flex; gap:6px; justify-content:flex-end; }
  .ops button { padding:5px 9px; font-size:11px; border-radius:8px; }
  .ops .del { color:var(--mark); }
  .foot { display:flex; gap:8px; padding:12px; }
  .foot .del { color:var(--mark); margin-left:auto; }
  .hint { font-size:11px; color:var(--dim); text-align:center; margin-top:8px; line-height:1.6; }
  .hidden { display:none !important; }
</style>
</head>
<body>

<div class="head">
  <div class="logo">TOUCHDOWN<span>.</span>TIMER</div>
  <div class="sub">ハードル タッチダウン計測</div>
</div>

<div class="videoBox" id="videoBox">
  <div class="drop" id="drop">
    <div class="icon">🎥</div>
    <div style="font-size:15px">タップして動画を選択</div>
    <div style="font-size:12px;margin-top:6px">「フォトライブラリ」からそのまま選べます</div>
  </div>
  <video id="video" playsinline webkit-playsinline muted preload="metadata" class="hidden"></video>
  <div class="err" id="err"></div>
  <div class="timeline hidden" id="timeline">
    <div class="tl-progress" id="tlProgress"></div>
    <div id="tlMarks"></div>
    <div class="tl-cursor" id="tlCursor"></div>
  </div>
</div>
<input type="file" id="file" accept="video/*" style="display:none">

<div id="controls" class="hidden">
  <div class="clockRow">
    <div class="clock" id="clock">0:00.00</div>
    <div class="meta" id="meta"></div>
  </div>

  <div class="grid5">
    <button id="b-10">−10</button>
    <button id="b-1">−1コマ</button>
    <button id="bPlay" class="play">▶ 再生</button>
    <button id="b+1">+1コマ</button>
    <button id="b+10">+10</button>
  </div>

  <div class="settings">
    <label>動画fps
      <select id="fps">
        <option>24</option><option>30</option><option selected>60</option><option>120</option><option>240</option>
      </select>
    </label>
    <label>再生速度
      <select id="rate">
        <option value="0.1">0.1x</option><option value="0.25">0.25x</option>
        <option value="0.5">0.5x</option><option value="1" selected>1x</option>
      </select>
    </label>
    <label>台数
      <select id="hurdles">
        <option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option selected>10</option>
      </select>
    </label>
    <button id="bChange" style="padding:7px 10px;font-size:12px">動画変更</button>
  </div>

  <button id="markBtn">⏱ スタート をマーク</button>
  <div class="hint" id="kbHint">±1コマで接地の瞬間に合わせてマーク。行の地点名タップでその位置へジャンプ</div>

  <div class="table hidden" id="table">
    <div class="row hdr"><div>地点</div><div>累積</div><div>区間ラップ</div><div style="text-align:right">操作</div></div>
    <div id="rows"></div>
    <div class="foot">
      <button id="bUndo">↩ 取消</button>
      <button id="bCopy">📋 コピー</button>
      <button id="bClear" class="del">全削除</button>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const video = $("video");
let marks = [];        // 秒数の配列
let fps = 60;
let numHurdles = 10;
let raf;

const maxMarks = () => numHurdles + 2;
const labelFor = (i) => i === 0 ? "スタート" : (i === numHurdles + 1 ? "フィニッシュ" : "H" + i);
const fmt = (t) => (t == null || isNaN(t)) ? "--.--" : t.toFixed(2);
const fmtClock = (t) => {
  if (!t || isNaN(t)) t = 0;
  const m = Math.floor(t / 60), s = t - m * 60;
  return m + ":" + s.toFixed(2).padStart(5, "0");
};

// ── 動画読み込み ──
$("drop").onclick = () => $("file").click();
$("bChange").onclick = () => $("file").click();
$("file").onchange = (e) => {
  const f = e.target.files[0];
  if (!f) return;
  $("err").style.display = "none";
  if (video.src) URL.revokeObjectURL(video.src);
  video.src = URL.createObjectURL(f);
  video.load();
  marks = [];
  $("drop").classList.add("hidden");
  video.classList.remove("hidden");
  $("controls").classList.remove("hidden");
  $("timeline").classList.remove("hidden");
  $("meta").innerHTML = f.name;
  render();
};
video.onerror = () => {
  $("err").textContent = "⚠ この動画形式を再生できませんでした。iPhoneの「写真」アプリから共有→ファイルに保存した動画、またはmp4形式をお試しください。";
  $("err").style.display = "block";
};

// ── 再生位置追従 ──
function loop() {
  updateClock();
  raf = requestAnimationFrame(loop);
}
loop();

function updateClock() {
  const t = video.currentTime || 0, d = video.duration || 0;
  $("clock").textContent = fmtClock(t);
  if (d > 0) {
    $("tlProgress").style.width = (t / d * 100) + "%";
    $("tlCursor").style.left = (t / d * 100) + "%";
  }
  if (marks.length > 0) {
    $("meta").innerHTML = "スタートから <b>" + fmt(t - marks[0]) + "s</b>";
  }
}

// ── 再生/コマ送り ──
function setPlayLabel() { $("bPlay").textContent = video.paused ? "▶ 再生" : "⏸ 停止"; }
$("bPlay").onclick = () => {
  if (video.paused) video.play().catch(()=>{});
  else video.pause();
};
video.onplay = setPlayLabel;
video.onpause = setPlayLabel;

function step(frames) {
  video.pause();
  const t = Math.min(Math.max(video.currentTime + frames / fps, 0), video.duration || 0);
  video.currentTime = t;
}
$("b-10").onclick = () => step(-10);
$("b-1").onclick = () => step(-1);
$("b+1").onclick = () => step(1);
$("b+10").onclick = () => step(10);

$("fps").onchange = (e) => fps = +e.target.value;
$("rate").onchange = (e) => video.playbackRate = +e.target.value;
$("hurdles").onchange = (e) => { numHurdles = +e.target.value; render(); };

// ── タイムライン(タップ/ドラッグでシーク) ──
const tl = $("timeline");
function tlSeek(clientX) {
  const r = tl.getBoundingClientRect();
  const p = Math.min(Math.max((clientX - r.left) / r.width, 0), 1);
  video.pause();
  video.currentTime = p * (video.duration || 0);
}
tl.addEventListener("pointerdown", (e) => {
  tl.setPointerCapture(e.pointerId);
  tlSeek(e.clientX);
});
tl.addEventListener("pointermove", (e) => {
  if (e.buttons) tlSeek(e.clientX);
});

// ── マーク ──
$("markBtn").onclick = () => {
  if (marks.length >= maxMarks()) return;
  marks.push(video.currentTime);
  const box = $("videoBox");
  box.classList.add("flash");
  setTimeout(() => box.classList.remove("flash"), 250);
  if (navigator.vibrate) navigator.vibrate(30);
  render();
};
$("bUndo").onclick = () => { marks.pop(); render(); };
$("bClear").onclick = () => { if (confirm("全マークを削除しますか?")) { marks = []; render(); } };

$("bCopy").onclick = async () => {
  const lines = ["地点\t累積(s)\t区間(s)"];
  marks.forEach((t, i) => {
    const cum = i === 0 ? 0 : t - marks[0];
    const split = i > 0 ? t - marks[i - 1] : null;
    lines.push(labelFor(i) + "\t" + fmt(cum) + "\t" + (split == null ? "-" : fmt(split)));
  });
  try { await navigator.clipboard.writeText(lines.join("\n")); alert("コピーしました"); }
  catch { alert("コピーに失敗しました"); }
};

// ── 描画 ──
function render() {
  // マークボタン
  const next = marks.length < maxMarks() ? labelFor(marks.length) : null;
  $("markBtn").textContent = next ? "⏱ " + next + " をマーク" : "計測完了";
  $("markBtn").disabled = !next;

  // タイムラインのマーク線
  const d = video.duration || 0;
  $("tlMarks").innerHTML = marks.map((t, i) =>
    `<div class="tl-mark${i===0?" start":""}" style="left:${d>0?(t/d*100):0}%"></div>`
  ).join("");

  // テーブル
  $("table").classList.toggle("hidden", marks.length === 0);
  $("rows").innerHTML = marks.map((t, i) => {
    const cum = i === 0 ? 0 : t - marks[0];
    const split = i > 0 ? t - marks[i - 1] : null;
    return `<div class="row">
      <div class="lbl${i===0?" start":""}" data-seek="${t}">${labelFor(i)}</div>
      <div class="mono">${fmt(cum)}</div>
      <div class="mono ${split!=null?"split":""}">${split!=null?fmt(split):"—"}</div>
      <div class="ops">
        <button data-fix="${i}">修正</button>
        <button data-del="${i}" class="del">削除</button>
      </div>
    </div>`;
  }).join("");

  // 行のイベント
  $("rows").querySelectorAll("[data-seek]").forEach(el =>
    el.onclick = () => { video.pause(); video.currentTime = +el.dataset.seek; });
  $("rows").querySelectorAll("[data-fix]").forEach(el =>
    el.onclick = () => { marks[+el.dataset.fix] = video.currentTime; render(); });
  $("rows").querySelectorAll("[data-del]").forEach(el =>
    el.onclick = () => { marks.splice(+el.dataset.del, 1); render(); });
}

// ── PCキーボード ──
window.addEventListener("keydown", (e) => {
  if (["INPUT","SELECT"].includes(e.target.tagName)) return;
  if (e.code === "Space") { e.preventDefault(); $("markBtn").click(); }
  else if (e.key === "ArrowRight") { e.preventDefault(); step(e.shiftKey ? 10 : 1); }
  else if (e.key === "ArrowLeft") { e.preventDefault(); step(e.shiftKey ? -10 : -1); }
  else if (e.key.toLowerCase() === "k") $("bPlay").click();
  else if (e.key.toLowerCase() === "z") $("bUndo").click();
});
</script>
</body>
</html>
